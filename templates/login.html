{% extends 'base-forms.html' %} {% block title %} Login {% endblock %} {% block
form %}
<h2>Bem-vindo de volta!</h2>
{% with mensagens = get_flashed_messages() %} {% if mensagens %}
<p class="form-erro">{{ mensagens[0] }}</p>
{% endif %} {% endwith %}
<form action="{{url_for('login')}}" method="post">
  <div class="inputs">
    <label for="email">E-mail</label>
    <input type="text" id="email" name="email" />
  </div>
  <div class="inputs">
    <label for="senha">Senha</label>
    <input type="password" id="senha" name="senha" />
  </div>
  <button class="botaoentrar">Entrar</button>
  <p>
    Não tem uma conta?
    <a href="{{url_for('cadastro')}}" class="semconta">Criar conta</a>
  </p>
</form>
{% endblock %}
